name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Tectonic
        run: |
          curl -fsSL -o tectonic.tar.gz \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf tectonic.tar.gz
          chmod +x tectonic

      - name: Compile CV PDFs
        run: |
          mkdir -p public/cv
          cd cv
          ../tectonic -X compile main.tex --outdir ../public/cv
          ../tectonic -X compile main-en.tex --outdir ../public/cv
          mv ../public/cv/main.pdf ../public/cv/Fernando-Rodriguez-Prianti-CV.pdf
          mv ../public/cv/main-en.pdf ../public/cv/Fernando-Rodriguez-Prianti-CV-en.pdf

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
